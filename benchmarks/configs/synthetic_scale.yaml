benchmarks:
  tiny:
    benchmark_id: synthetic_tiny_1k_seed101
    manual_only: false
    description: "CI benchmark with 1,000 reads."
    seed: 101
    read_count: 1000
    read_length: 1800
    total_read_bp: 1800000
    background_length: 2500
    monomer_length_range: [300, 760]
    monomer_lengths: [421, 729]
    copy_numbers: [8, 6]
    error_rate: 0.005
    discover:
      min_period: 300
      max_period: 760
      min_support_reads: 5
      min_repeat_span: 800
      min_read_length: 500
      kmer_size: 11
      top_periods: 5
      min_seed_occurrences: 2
      min_spacing_support: 2
      max_pairs_per_kmer: 100
      progress_every: 250
    locate: {window_size: 500, step_size: 250, k: 21}
    probe: {min_len: 80, max_len: 300}
    expected_runtime_record: "benchmark_summary.tsv"
    expected_output_files: &expected_outputs
      - simulated/reads.fa
      - simulated/assembly.fa
      - discover/candidate_reads.tsv
      - discover/monomers.fa
      - discover/families.tsv
      - quantify/copy_number.tsv
      - locate/repeat_density.bedgraph
      - locate/arrays.bed
      - locate/assembly_vs_read_cn.tsv
      - probe/probes.fa
      - probe/probes.rank.tsv
      - probe/in_silico_fish.tsv

