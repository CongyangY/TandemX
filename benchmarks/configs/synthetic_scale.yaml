benchmarks:
  tiny:
    benchmark_id: synthetic_tiny_seed101
    manual_only: false
    description: "CI-scale synthetic benchmark kept below 1 MB of reads."
    seed: 101
    read_count: 140
    read_length: 1800
    total_read_bp: 252000
    background_length: 2500
    monomer_length_range: [300, 760]
    monomer_lengths: [421, 729]
    copy_numbers: [8, 6]
    error_rate: 0.005
    discover:
      min_monomer_len: 300
      max_monomer_len: 760
      min_support_reads: 3
      min_repeat_span: 800
    locate:
      window_size: 500
      step_size: 250
      k: 21
    probe:
      min_len: 80
      max_len: 300
    expected_runtime_record: "benchmark_summary.tsv"
    expected_output_files:
      - simulated/reads.fa
      - simulated/assembly.fa
      - discover/candidate_reads.tsv
      - discover/monomers.fa
      - discover/families.tsv
      - quantify/copy_number.tsv
      - locate/repeat_density.bedgraph
      - locate/arrays.bed
      - locate/assembly_vs_read_cn.tsv
      - probe/probes.fa
      - probe/probes.rank.tsv
      - probe/in_silico_fish.tsv
